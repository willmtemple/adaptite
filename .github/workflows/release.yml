name: Release

# Publishes to crates.io when a GitHub Release is published. The release's tag
# must be `v<version>` and match the crate version. Create the release from a
# commit whose CI run is fully green.
on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      # mise's rust backend delegates to rustup, which auto-installs a minimal
      # toolchain (no rustfmt/clippy) on a fresh runner; install the components
      # explicitly, mirroring ci.yml.
      - name: Ensure rust components
        run: mise exec -- bash -c 'rustup toolchain install "$RUSTUP_TOOLCHAIN" -c rustfmt -c clippy --no-self-update'
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Verify tag matches the crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json;print(next(p['version'] for p in json.load(sys.stdin)['packages'] if p['name']=='adaptite'))")
          if [ "$tag" != "$version" ]; then
            echo "Tag $tag does not match adaptite version $version" >&2
            exit 1
          fi
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Package dry-run
        run: cargo publish --dry-run

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: validate
    environment: release
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      # The first publish must use an API token (CARGO_REGISTRY_TOKEN). Once
      # the crate exists on crates.io, this job can migrate to crates.io
      # Trusted Publishing (OIDC via rust-lang/crates-io-auth-action) and the
      # long-lived token can be revoked.
      - name: Publish adaptite
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
